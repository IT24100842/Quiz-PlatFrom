<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programming Logic Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="quiz-timer.js" defer></script>
  <script src="quiz-submission.js" defer></script>
</head>
<body class="dashboard-page">
  <div class="dashboard-shell">
    <header class="dashboard-header">
      <div>
        <p class="eyebrow dark">Quiz Platform</p>
        <h1>Programming Logic Quiz</h1>
      </div>
      
    </header>

    <main class="dashboard-main">
      <div class="quiz-meta">
        <p class="quiz-instruction">Answer all questions before the timer ends.</p>
        <p class="timer-pill">Time Left: <span data-time-left>--:--</span></p>
      </div>

      <form class="quiz-page" action="#" method="post" data-quiz-timer data-duration-minutes="30" data-quiz-title="Programming Logic Quiz">
        <article class="question-card">
          <h2>1. Which data type stores true/false values?</h2>
          <ul class="option-list">
            <li><label><input type="radio" name="q1" required /> String</label></li>
            <li><label><input type="radio" name="q1" /> Integer</label></li>
            <li><label><input type="radio" name="q1" data-correct="true" /> Boolean</label></li>
            <li><label><input type="radio" name="q1" /> Array</label></li>
          </ul>
        </article>

        <article class="question-card">
          <h2>2. Which structure is best for repeating a task?</h2>
          <ul class="option-list">
            <li><label><input type="radio" name="q2" required /> Conditional statement</label></li>
            <li><label><input type="radio" name="q2" data-correct="true" /> Loop</label></li>
            <li><label><input type="radio" name="q2" /> Function call</label></li>
            <li><label><input type="radio" name="q2" /> Variable declaration</label></li>
          </ul>
        </article>

        <article class="question-card">
          <h2>3. What does an if statement do?</h2>
          <ul class="option-list">
            <li><label><input type="radio" name="q3" required /> Repeats forever</label></li>
            <li><label><input type="radio" name="q3" /> Sorts data</label></li>
            <li><label><input type="radio" name="q3" data-correct="true" /> Makes a decision based on a condition</label></li>
            <li><label><input type="radio" name="q3" /> Connects to a database</label></li>
          </ul>
        </article>

        <article class="question-card">
          <h2>4. Which is used to store multiple values in order?</h2>
          <ul class="option-list">
            <li><label><input type="radio" name="q4" required data-correct="true" /> Array</label></li>
            <li><label><input type="radio" name="q4" /> Boolean</label></li>
            <li><label><input type="radio" name="q4" /> Float</label></li>
            <li><label><input type="radio" name="q4" /> Character</label></li>
          </ul>
        </article>

        <div class="quiz-actions">
          <button type="submit">Submit Quiz</button>
          <a href="student-dashboard.html" class="button-secondary">Cancel</a>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
