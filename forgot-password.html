<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
</head>
<body data-forgot-password="true">
  <main class="page">
    <section class="panel panel-brand" aria-hidden="true">
      <p class="eyebrow">Quiz Platform</p>
      <h1>Password Recovery</h1>
      <p class="lead">Request a reset code and set a new password for your account.</p>
      <div class="status-card">
        <h2>Secure Reset</h2>
        <p>Reset codes are sent to your Gmail and expire in 10 minutes.</p>
      </div>
    </section>

    <section class="panel panel-form">
      <div class="form-wrap">
        <p class="eyebrow" data-forgot-role-label>Account Recovery</p>
        <h2>Reset Your Password</h2>

        <form class="login-form forgot-request-form" novalidate>
          <label for="forgot-email">Account Email</label>
          <input type="email" id="forgot-email" name="email" placeholder="you@example.com" required />
          <input type="hidden" name="role" data-forgot-role-input />
          <button type="submit">Get Reset Code</button>
        </form>

        <form class="login-form forgot-reset-form" novalidate>
          <label for="reset-code">Reset Code</label>
          <input type="text" id="reset-code" name="code" placeholder="6 digit code" required />

          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="newPassword" placeholder="At least 6 characters" required />

          <label for="confirm-new-password">Confirm New Password</label>
          <input type="password" id="confirm-new-password" name="confirmNewPassword" placeholder="Re-enter new password" required />

          <button type="submit">Reset Password</button>
          <p class="switch-auth">Back to login: <a class="link" data-forgot-login-link href="student-login.html">Student Login</a></p>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
