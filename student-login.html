<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
</head>
<body data-login-role="STUDENT">
  <main class="page">
    <section class="panel panel-brand panel-brand--student" aria-hidden="true">
      <p class="eyebrow">Quiz Platform</p>
      <h1>Student Portal</h1>
      <p class="lead">Sign in to attempt quizzes, check marks, and view upcoming assessments.</p>
      <p class="panel-brand-note">Your dashboard shows personal progress and quiz schedules.</p>
    </section>

    <section class="panel panel-form">
      <div class="form-wrap">
        <p class="eyebrow">Student Login</p>
        <h2>Sign in to Continue</h2>

        <form class="login-form login-form--floating" novalidate>
          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                <path d="m5 8 7 5 7-5"></path>
              </svg>
            </span>
            <input type="email" class="field-input" id="email" name="email" placeholder=" " required />
            <label class="floating-label" for="email">Student Email</label>
          </div>

          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                <path d="M8 10V7.5a4 4 0 0 1 8 0V10"></path>
              </svg>
            </span>
            <input type="password" class="field-input" id="password" name="password" placeholder=" " required />
            <label class="floating-label" for="password">Password</label>
          </div>

          <div class="form-row">
            <label class="check">
              <input type="checkbox" name="remember" />
              <span>Remember me</span>
            </label>
            <a href="forgot-password.html?role=STUDENT" class="link">Forgot password?</a>
          </div>

          <button type="submit">Sign In</button>
          <p class="switch-auth">New student? <a href="register.html" class="link link-emphasis">Create an account</a></p>
          <p class="switch-auth">Need admin access? <a href="admin-login.html" class="link link-emphasis">Admin login</a></p>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
