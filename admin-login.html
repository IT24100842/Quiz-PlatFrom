<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
</head>
<body data-login-role="ADMIN">
  <main class="page">
    <section class="panel panel-brand" aria-hidden="true">
      <p class="eyebrow">Quiz Platform</p>
      <h1>Admin Control</h1>
      <p class="lead">Manage exams, monitor submissions, and keep your learning ecosystem secure.</p>
      <div class="status-card">
        <h2>Security Status</h2>
        <p>Two-factor verification enabled for administrator accounts.</p>
      </div>
    </section>

    <section class="panel panel-form">
      <div class="form-wrap">
        <p class="eyebrow">Restricted Access</p>
        <h2>Sign in as Admin</h2>

        <form class="login-form login-form--floating" novalidate>
          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                <path d="m5 8 7 5 7-5"></path>
              </svg>
            </span>
            <input type="email" class="field-input" id="email" name="email" placeholder=" " required />
            <label class="floating-label" for="email">Admin Email</label>
          </div>

          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                <path d="M8 10V7.5a4 4 0 0 1 8 0V10"></path>
              </svg>
            </span>
            <input type="password" class="field-input" id="password" name="password" placeholder=" " required />
            <label class="floating-label" for="password">Password</label>
          </div>

          <div class="form-row">
            <label class="check">
              <input type="checkbox" name="remember" />
              <span>Keep me signed in</span>
            </label>
            <a href="forgot-password.html?role=ADMIN" class="link">Forgot password?</a>
          </div>

          <button type="submit">Sign In</button>

          <p class="switch-auth">Are you a student? <a href="student-login.html" class="link">Student login</a></p>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
